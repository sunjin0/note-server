# Common Error Messages
error.server.internal=服务器内部错误
error.validation.failed=请求数据验证失败
error.unauthorized=未授权访问
error.forbidden=禁止访问
error.not.found=请求的资源不存在
error.method.not.allowed=请求方法不允许
error.media.type.not.supported=不支持的媒体类型
error.conflict=资源冲突

# User Related Errors
error.user.not.found=用户不存在
error.user.already.exists=用户已存在
error.user.disabled=账号已被禁用
error.user.email.exists=邮箱已被注册
error.user.username.exists=用户名已被注册
error.user.unauthorized=用户未授权
error.user.invalid.credentials=用户名或密码错误
error.user.current.password.wrong=当前密码错误

# Authentication Related Errors
error.auth.invalid.token=无效的令牌
error.auth.token.expired=令牌已过期
error.auth.invalid.refresh.token=无效的刷新令牌
error.auth.refresh.token.revoked=刷新令牌已被撤销
error.auth.refresh.token.expired=刷新令牌已过期
error.auth.invalid.token.type=无效的令牌类型
error.auth.invalid.auth.header=无效的授权头
error.auth.access.denied=访问被拒绝

# Sync Related Errors
error.sync.entry.not.found=条目不存在或无权访问
error.sync.merged.entry.empty=合并后的条目不能为空
error.sync.invalid.resolution=无效的解决方式: {0}

# Success Messages
success.logout=登出成功
success.password.changed=密码修改成功
success.profile.updated=个人资料更新成功
success.account.deleted=账号删除成功
success.data.synced=数据同步成功
success.conflict.resolved=冲突解决成功
success.code.sent=验证码已发送
success.password.reset=密码重置成功

# Validation Errors
validation.username.required=用户名是必填项
validation.username.size=用户名长度必须在 3 到 20 个字符之间
validation.password.required=密码是必填项
validation.password.size=密码长度必须在 6 到 100 个字符之间
validation.email.required=邮箱是必填项
validation.email.invalid=邮箱格式不正确
validation.nickname.size=昵称长度不能超过 50 个字符
validation.identifier.required=邮箱或用户名是必填项
validation.current.password.required=当前密码是必填项
validation.new.password.required=新密码是必填项
validation.new.password.size=新密码长度必须至少为 6 个字符
validation.refresh.token.required=刷新令牌是必填项
validation.device.id.required=设备 ID 是必填项
validation.resolution.required=解决方式是必填项
validation.code.required=验证码是必填项
validation.code.purpose.required=验证码用途是必填项

# Verification Code Errors
error.code.invalid=验证码错误
error.code.expired=验证码已过期
error.code.send.too.frequently=验证码发送过于频繁，请稍后再试
error.code.too.many.attempts=验证码错误次数过多，请重新获取
error.mail.send.failed=邮件发送失败，请稍后再试
