spring:
  application:
    name: note-server
  docker:
    compose:
      enabled: false
  messages:
    basename: i18n/messages
    encoding: UTF-8
    fallback-to-system-locale: false
    default-locale: zh_CN
    cache-duration: 3600s
  datasource:
    url: jdbc:mysql://192.168.1.121:3306/note?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  mail:
    host: ${MAIL_HOST:smtp.example.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
app:
  verification:
    code:
      ttl-seconds: ${VERIFICATION_CODE_TTL_SECONDS:300}
      resend-cooldown-seconds: ${VERIFICATION_CODE_RESEND_COOLDOWN_SECONDS:60}
      max-attempts: ${VERIFICATION_CODE_MAX_ATTEMPTS:5}
      dev-mode: ${VERIFICATION_CODE_DEV_MODE:true}
      dev-code: ${VERIFICATION_CODE_DEV_CODE:123456}
  mail:
    from: ${MAIL_FROM:no-reply@example.com}
    subject-prefix: ${MAIL_SUBJECT_PREFIX:[Note] }
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.note.noteserver.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-for-jwt-signing-mood-journal-app-2024}
  access-token-expiration: ${JWT_ACCESS_EXPIRATION:86400000}  # 24小时
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800000}  # 7天

server:
  port: 8081

logging:
  level:
    com.note.noteserver: DEBUG
    org.springframework.jdbc: DEBUG
